[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.well-known/assetlinks.json"
  status = 200
  force = true

[[redirects]]
  from = "/player"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/player/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200